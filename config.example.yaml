# ---------------------------------------------------------------------------
# lean-ai-serve configuration
#
# YAML is the single source of truth.  Secret values support two patterns:
#
#   ENV[VAR_NAME]     — resolved from the named environment variable.
#   ENC[ciphertext]   — decrypted using the master key from encryption.at_rest.
#
# Quick-start for encrypted secrets:
#   1. lean-ai-serve config generate-key /etc/lean-ai-serve/master.key
#   2. lean-ai-serve config encrypt-value "my-secret" -k /etc/lean-ai-serve/master.key
#   3. Paste the ENC[...] output into this file.
#   4. Set encryption.at_rest.enabled + key_file below.
# ---------------------------------------------------------------------------

server:
  host: "0.0.0.0"
  port: 8420
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

security:
  mode: "api_key"                    # api_key, ldap, oidc, ldap+api_key
  jwt_secret: ""                     # Auto-generated if empty (sessions won't survive restarts)
  # jwt_secret: "ENV[MY_JWT_SECRET]"  # Read from env var at startup
  # jwt_secret: "ENC[base64...]"      # Encrypted — decrypted at startup via master key
  jwt_expiry_hours: 8.0

  # LDAP/Active Directory (when mode includes "ldap")
  ldap:
    server_url: "ldaps://ad.corp.com:636"
    bind_dn: "CN=svc-lean-ai,OU=ServiceAccounts,DC=corp,DC=com"
    bind_password_env: "LEAN_AI_LDAP_BIND_PASSWORD"
    user_search_base: "OU=Users,DC=corp,DC=com"
    user_search_filter: "(sAMAccountName={username})"
    group_search_base: "OU=Groups,DC=corp,DC=com"
    group_role_mapping:
      "CN=AI-Admins,OU=Groups,DC=corp,DC=com": "admin"
      "CN=AI-ModelManagers,OU=Groups,DC=corp,DC=com": "model-manager"
      "CN=AI-Trainers,OU=Groups,DC=corp,DC=com": "trainer"
      "CN=AI-Users,OU=Groups,DC=corp,DC=com": "user"
      "CN=AI-Auditors,OU=Groups,DC=corp,DC=com": "auditor"
    default_role: "user"
    cache_ttl: 300
    connection_pool_size: 5

  # OIDC (when mode includes "oidc")
  oidc:
    issuer_url: ""                     # e.g. "https://keycloak.corp.com/realms/ai"
    client_id: ""
    audience: ""                       # JWT audience claim to validate
    roles_claim: "realm_access.roles"  # Dot-notation path to roles in JWT payload
    role_mapping:                      # Map IdP roles -> lean-ai-serve roles
      # "keycloak-admin": "admin"
      # "keycloak-user": "user"
    default_role: "user"               # Fallback when no roles found
    jwks_cache_ttl: 3600               # JWKS cache TTL in seconds

  # Content filtering for PHI detection
  content_filtering:
    enabled: false
    patterns:
      - name: "SSN"
        pattern: '\b\d{3}-\d{2}-\d{4}\b'
        action: "warn"
      - name: "MRN"
        pattern: '\bMRN[:\s]?\d{6,}\b'
        action: "warn"

audit:
  enabled: true
  log_prompts: true
  log_prompts_hash_only: false       # Store SHA-256 hash instead of full content
  retention_days: 2190               # 6 years (HIPAA minimum)
  storage: "sqlite"

encryption:
  at_rest:
    enabled: false
    key_source: "file"               # file, env, vault
    key_file: ""                     # Path to 256-bit master key file
    key_env_var: "LEAN_AI_ENCRYPTION_KEY"  # Env var name (hex or base64, when key_source=env)
    # --- Vault settings (when key_source="vault") ---
    # vault_path: "secret/data/lean-ai-serve/encryption-key"
    # vault_key_field: "key"         # Field name within the Vault secret
    # vault_auth_method: "token"     # token or approle
    # vault_role_id_env: "VAULT_ROLE_ID"      # Env var for AppRole role ID
    # vault_secret_id_env: "VAULT_SECRET_ID"  # Env var for AppRole secret ID
    # vault_cache_ttl: 300           # Seconds to cache the fetched key

cache:
  directory: "~/.cache/lean-ai-serve"
  huggingface_token: ""              # Or: "ENV[HF_TOKEN]" / "ENC[base64...]"

defaults:
  gpu_memory_utilization: 0.90
  max_model_len: null
  dtype: "auto"

# Example model configurations
models:
  # qwen3-coder-30b:
  #   source: "Qwen/Qwen3-Coder-30B-A3B"
  #   gpu: [0, 1]
  #   tensor_parallel_size: 2
  #   max_model_len: 131072
  #   tool_call_parser: "hermes"
  #   reasoning_parser: "qwen3"
  #   guided_decoding_backend: "xgrammar"
  #   enable_lora: true
  #   max_loras: 4
  #   autoload: true
  #   kv_cache:
  #     dtype: "fp8_e4m3"
  #     calculate_scales: true           # Calculate KV cache scales (for FP8)
  #   context:
  #     enable_prefix_caching: true
  #     cpu_offload_gb: 0                # GB of KV cache to offload to CPU
  #     swap_space: 0                    # GiB of CPU swap for KV cache
  #   speculative:
  #     enabled: false
  #     strategy: "draft"                # draft, ngram, eagle
  #     draft_model: ""
  #     num_tokens: 5
  #   lifecycle:
  #     idle_sleep_timeout: 3600         # Seconds idle before sleeping (0=never)
  #     sleep_level: 1                   # 1=auto-wakeable, 2=full unload
  #     auto_wake_on_request: true       # Auto-wake on inference request (level 1 only)

# Training / fine-tuning subsystem
training:
  enabled: false
  backend: "llama-factory"             # llama-factory (extensible)
  output_directory: ""                 # Default: {cache}/training_outputs
  max_concurrent_jobs: 1
  default_gpu: [0]                     # GPU(s) assigned when job doesn't specify
  dataset_directory: ""                # Default: {cache}/datasets
  max_dataset_size_mb: 1024            # Max upload size per dataset

# --- Observability ---
# All features are independently toggleable.

metrics:
  enabled: true
  gpu_poll_interval: 30              # Seconds between GPU metric snapshots

logging:
  json_output: true                  # true=JSON lines (production), false=console (dev)
  level: "INFO"                      # DEBUG, INFO, WARNING, ERROR, CRITICAL

alerts:
  enabled: true
  evaluation_interval: 60            # Seconds between alert evaluations
  rules: []                          # Custom rules override defaults. Example:
    # - name: "high_gpu_memory"
    #   metric: "gpu_memory_used_pct"
    #   condition: "gt"              # gt, lt, gte, lte, eq
    #   threshold: 90.0
    #   severity: "warning"

tracing:
  enabled: false                     # Requires: pip install lean-ai-serve[tracing]
  endpoint: ""                       # OTLP endpoint, e.g. "http://otel-collector:4317"
  protocol: "grpc"                   # grpc or http
  service_name: "lean-ai-serve"

context_compression:
  enabled: false                     # Requires: pip install llmlingua
  method: "llmlingua2"               # Compression algorithm
  target_ratio: 0.5                  # Target compression ratio (0.0-1.0, lower = more compression)
  min_length: 4096                   # Skip compression for prompts shorter than this (chars)

# --- Web Dashboard ---
# Built-in server-rendered dashboard (HTMX + Jinja2 + Pico CSS).
# Access at http://localhost:8420/dashboard/ when enabled.

dashboard:
  enabled: true                      # Serve the web dashboard UI
  session_secret: ""                 # HMAC secret for CSRF tokens (auto-generated if empty)
  csrf_enabled: true                 # Require CSRF tokens on state-changing requests
